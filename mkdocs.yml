site_name: AI and Agentics Basics
theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.integrate
    - content.tabs.link

docs_dir: docs

plugins:
  - search

extra_javascript:
  - javascripts/quiz.js

extra_css:
  - stylesheets/quiz.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - md_in_html
  - tables
  - attr_list

nav:
  - Get Started: index.md
  - Course Map & Schedules: overview.md
  - Bedrock:
    - AI Literacy: bedrock/ai-literacy.md
    - Personalizing Your AI: bedrock/personalizing-your-ai.md
  - Terminal Basics:
    - The Machine: terminal-basics/the-machine.md
    - The Terminal: terminal-basics/the-terminal.md
  - Agentic AI:
    - Core Concepts: agentic-ai/agent-concepts.md
  - Mental Models:
    - The Module: mental-models/core-content.md
    - Quick Reference: mental-models/quick-reference.md
    - Workbook: mental-models/workbook.md
  - Technical Foundations:
    - Course Design (M1-M8): prereq-course/course-design.md
    - Module Quick Reference: prereq-course/module-summary.md
  - Instructor Handbooks:
    - Consolidated Teaching Guide: instructor/teaching-guide.md
    - Content Style Guide: instructor/style-guide.md
    - Mental Models Teaching Guide: instructor/mental-models-guide.md
    - Course Instructor Guide: instructor/prereq-guide.md
    - Day 0 Teaching Scaffold: instructor/day0-scaffold.md
